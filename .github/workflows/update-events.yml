name: Events aktualisieren

on:
  schedule:
    # Täglich um 04:17 UTC (~06:17 Dresdner Zeit)
    - cron: "17 4 * * *"
  workflow_dispatch: {}   # erlaubt manuelles Auslösen im Actions-Tab

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Events holen
        env:
          TICKETMASTER_KEY: ${{ secrets.TICKETMASTER_KEY }}
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: node scripts/fetch-events.js

      - name: events.json committen (falls geändert)
        run: |
          git config user.name "Elbliebe Bot"
          git config user.email "elbliebe-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain events.json)" ]; then
            git add events.json
            git commit -m "Events automatisch aktualisiert ($(date -u +%Y-%m-%d))"
            git push
            echo "events.json aktualisiert und gepusht."
          else
            echo "Keine Änderungen an events.json."
          fi
